    <style>
        /* FIX 1: Tame the timer font size */

        /* Hide scrollbar for Chrome, Safari and Opera */

            display: none;

        /* LIST */

        /* HUD & OVERLAYS */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.98); z-index: 500; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .timer-q { font-size: 1.5rem; color: var(--alert); font-family: var(--f-main); margin-bottom: 20px; }
        .hud-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 95%; max-width: 400px; }

        .hud-btn:active { background: var(--text); color: #000; }
        
        .modal { background: #000; border: 1px solid var(--text); padding: 20px; width: 90%; max-width: 320px; text-align: center; box-shadow: 0 0 30px rgba(0,255,0,0.15); }
        .inp-full { width: 100%; background: #000; border: 1px solid var(--dim); color: var(--text); padding: 12px; margin: 10px 0; text-align: center; font-family: var(--f-hud); font-size: 1.2rem; }

        @keyframes break-pop {

<body class="theme-ghost">
    <div id="battery-line"></div>
    <div id="root"></div>
    <canvas id="confetti-canvas"></canvas>

    <!-- ========================================== -->
    <!-- SURGICAL OFFLINE BACKEND EMULATOR INJECTION -->
    <!-- ========================================== -->
    <script>
    (function() {
        const LS = {
            get: (k, d) => { try { const v = localStorage.getItem(k); return v ? JSON.parse(v) : d; } catch(e) { return d; } },
            set: (k, v) => { try { localStorage.setItem(k, JSON.stringify(v)); } catch(e) {} },
            del: (k) => { try { localStorage.removeItem(k); } catch(e) {} }
        };

        const getLocalKey = (d) => {
            const y = d.getFullYear();
            const m = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        };

        // --- ANDROID NATIVE BRIDGE INJECTION ---
        window.ANDROID_MEDIA_STATE = { title: 'SYSTEM IDLE', artist: 'Native Media', active: false };
        window.updateNativeMedia = (title, artist, active) => {
            window.ANDROID_MEDIA_STATE = {
                title: title && title !== 'null' ? title : 'SYSTEM IDLE',
                artist: artist && artist !== 'null' ? artist : 'Unknown',
                active: active === 'true'
            };
        };

        // Offline Lofi Streams replacement for ADB Media Plugin
        const STATIONS = [
            { title: 'Lofi Girl Focus',      artist: 'ChilledCow',  url: 'https://play.streamafrica.net/lofiradio' },
            { title: 'Synthwave / Retrowave', artist: 'The Midnight', url: 'https://streams.ilovemusic.de/iloveradio17.mp3' },
            { title: 'Classical Masters',    artist: 'Mozart/Bach',  url: 'https://strm112.1.fm/classical_mobile_mp3' }
        ];

        window.audioPlayer = new Audio(STATIONS[0].url);
        window.audioPlayer.loop = true;
        let currentStationIdx = 0;
        let isPlaying = false;

        let zenBackendState = LS.get('jae_zen_state', {
            mode: false, balance: 0, progress: 0, penalty: 0,
            coin_deductions: 0, penalty_accum: 0, has_completed_task: false,
            last_tick: Date.now(), last_finish_ts: 0, momentum: 0,
            date: getLocalKey(new Date())
        });

        const getStats = (ds) => LS.get(`jae_stats_${ds}`, {
            today_time: 0, output_time: 0, accuracy: 0, subject_breakdown: {},
            total_coins: LS.get('jae_coins', 0), tasks_total: 0, tasks_completed: 0, questions_today: 0
        });
        const saveStats = (ds, st) => {
            LS.set(`jae_stats_${ds}`, st);
            if (st.total_coins !== undefined) LS.set('jae_coins', st.total_coins);
        };

        const mockApi = async (url, options) => {
            const method = (options && options.method) || 'GET';
            const body = (options && options.body) ? JSON.parse(options.body) : null;
            const [path, query] = url.split('?');
            const params = new URLSearchParams(query || '');
            const dateStr = params.get('date') || getLocalKey(new Date());
            const today = getLocalKey(new Date());

            if (path === '/api/tasks') {
                if (method === 'GET') return LS.get(`jae_tasks_${dateStr}`, null);
                if (method === 'POST') {
                    LS.set(`jae_tasks_${body.date}`, body.tasks);
                    const st = getStats(body.date);
                    st.tasks_total = body.tasks.length;
                    st.tasks_completed = body.tasks.filter(t => t.done).length;
                    saveStats(body.date, st);
                    return { ok: true };
                }
            }

            if (path === '/api/tasks/paused') {
                if (method === 'GET') return LS.get('jae_paused', {});
                if (method === 'POST') { LS.set('jae_paused', body); return { ok: true }; }
            }

            if (path === '/api/task/active') {
                if (method === 'GET') return LS.get('jae_active', null);
                if (method === 'POST') {
                    const fStart = LS.get(`jae_first_start_${today}`, 0);
                    if (!fStart) LS.set(`jae_first_start_${today}`, body.abs_start || Date.now());
                    if (zenBackendState.mode) {
                        const lastFin = zenBackendState.last_finish_ts || 0;
                        zenBackendState.momentum = (lastFin > 0 && (Date.now() - lastFin) / 1000 < 300)
                            ? (zenBackendState.momentum || 0) + 1 : 0;
                        LS.set('jae_zen_state', zenBackendState);
                    }
                    LS.set('jae_active', body);
                    return { ok: true };
                }
                if (method === 'DELETE') { LS.del('jae_active'); return { ok: true }; }
            }

            if (path === '/api/task/break') {
                if (body && body.paused_tasks !== undefined) LS.set('jae_paused', body.paused_tasks);
                LS.del('jae_active');
                return { ok: true, status: 'ok' };
            }

            if (path === '/api/stats' && method === 'GET') {
                const rawStats = getStats(dateStr);
                const dTasks = LS.get(`jae_tasks_${dateStr}`, []);
                const offlineDone = dTasks.filter(t => t.mode === 'offline' && t.done).length;
                let baseCoins = (rawStats.total_coins || 0) + (offlineDone * 50);

                if (dateStr === today) {
                    const deductions = zenBackendState.coin_deductions || 0;
                    const activeT = LS.get('jae_active', null);
                    if (activeT && activeT.abs_start) {
                        const liveSecs = Math.floor((Date.now() - activeT.abs_start) / 1000) + (activeT.elapsed || 0);
                        rawStats.today_time += liveSecs;
                        if (activeT.mode === 'focus') {
                            baseCoins += liveSecs <= 3600 ? Math.floor(liveSecs / 60) : 60 + Math.floor((liveSecs - 3600) / 40);
                        }
                    }
                    rawStats.total_coins = Math.max(0, baseCoins - deductions);
                    const fStart = LS.get(`jae_first_start_${today}`, 0);
                    if (fStart > 0) {
                        const real_el = (Date.now() - fStart) / 1000;
                        rawStats.grind_ratio = real_el > 0 ? Math.min(1, rawStats.today_time / real_el) : 0;
                    }
                    rawStats.lanterns = Math.floor((rawStats.today_time || 0) / 3600);
                } else {
                    rawStats.total_coins = baseCoins;
                }
                rawStats.zen_momentum = zenBackendState.momentum || 0;
                return rawStats;
            }

            if (path === '/api/reset_day') {
                LS.del(`jae_tasks_${today}`);
                LS.del(`jae_stats_${today}`);
                LS.del(`jae_first_start_${today}`);
                LS.del('jae_active');
                return { ok: true };
            }

            if (path === '/api/log_session') {
                if (LS.get('jae_active', null) && zenBackendState.mode) {
                    const catchupDt = (Date.now() - zenBackendState.last_tick) / 1000;
                    if (catchupDt > 0) {
                        zenBackendState.progress = (zenBackendState.progress || 0) + catchupDt;
                        const cyc = 52 * 60;
                        while (zenBackendState.progress >= cyc) { zenBackendState.progress -= cyc; zenBackendState.balance += (17 * 60); }
                    }
                }
                zenBackendState.last_tick = Date.now();
                zenBackendState.last_finish_ts = Date.now();
                LS.set('jae_zen_state', zenBackendState);
                LS.del('jae_active');

                const stats = getStats(today);
                stats.today_time += body.duration || 0;
                if (body.type !== 'focus') stats.output_time = (stats.output_time || 0) + (body.duration || 0);

                const firstStart = LS.get(`jae_first_start_${today}`, 0) || (Date.now() - (body.duration || 0) * 1000);
                if (!LS.get(`jae_first_start_${today}`, 0)) LS.set(`jae_first_start_${today}`, firstStart);
                const real_elapsed = (Date.now() - firstStart) / 1000;
                stats.grind_ratio = real_elapsed > 0 ? Math.min(1, stats.today_time / real_elapsed) : 0;
                stats.questions_today += (body.questions || 0);

                const tag = body.tag || 'MISC';
                if (!stats.subject_breakdown[tag]) stats.subject_breakdown[tag] = { time: 0, q: 0, c: 0, marks: 0, marks_total: 0, train_q: 0, train_c: 0 };
                const sb = stats.subject_breakdown[tag];
                sb.time += body.duration || 0;
                if (body.type === 'training') {
                    sb.train_q += body.questions || 0; sb.train_c += body.correct || 0;
                    sb.q += body.questions || 0;       sb.c += body.correct || 0;
                }
                if (body.type === 'online_test' || body.type === 'focus' || body.type === 'training') {
                    sb.marks += Number(body.marks_scored || 0);
                    sb.marks_total += Number(body.marks_total || 0);
                }
                let totQ = 0, totC = 0;
                Object.values(stats.subject_breakdown).forEach(s => { totQ += s.train_q; totC += s.train_c; });
                stats.accuracy = totQ > 0 ? (totC / totQ) * 100 : 0;

                let earned = 0;
                if (body.type === 'focus') {
                    earned = body.duration <= 3600 ? Math.floor(body.duration / 60) : 60 + Math.floor((body.duration - 3600) / 40);
                } else {
                    earned = Number(body.marks_scored || 0);
                }
                stats.total_coins = (stats.total_coins || 0) + earned;
                saveStats(today, stats);
                return { stats };
            }

            if (path === '/api/zen/tick') {
                if (zenBackendState.date && zenBackendState.date !== today) {
                    zenBackendState = { mode: false, balance: 0, progress: 0, penalty: 0, coin_deductions: 0, penalty_accum: 0, has_completed_task: false, last_tick: Date.now(), last_finish_ts: 0, momentum: 0, date: today };
                }
                zenBackendState.date = today;

                const now_ts = Date.now();
                let dt = (now_ts - (zenBackendState.last_tick || now_ts)) / 1000;
                if (dt < 0) dt = 0;
                zenBackendState.last_tick = now_ts;

                if (body && body.mode === true) zenBackendState.mode = true;

                const todaySt = getStats(today);
                zenBackendState.has_completed_task = (todaySt.today_time || 0) > 0;
                const effectiveStatus = LS.get('jae_active', null) ? 'focus' : ((body && body.status) || 'idle');

                if (zenBackendState.mode && dt > 0) {
                    if (effectiveStatus === 'focus') {
                        zenBackendState.progress = (zenBackendState.progress || 0) + dt;
                        const cyc = 52 * 60;
                        while (zenBackendState.progress >= cyc) { zenBackendState.progress -= cyc; zenBackendState.balance += (17 * 60); }
                    } else {
                        if (dt <= 60) {
                            let rem = dt;
                            if (zenBackendState.balance > 0) {
                                const taken = Math.min(zenBackendState.balance, rem);
                                zenBackendState.balance -= taken; rem -= taken;
                            }
                            if (rem > 0 && zenBackendState.has_completed_task) {
                                const dTasks = LS.get(`jae_tasks_${today}`, []);
                                const offDone = dTasks.filter(t => t.mode === 'offline' && t.done).length;
                                const gross = (todaySt.total_coins || 0) + (offDone * 50);
                                const net = gross - (zenBackendState.coin_deductions || 0);
                                if (net > 0) {
                                    zenBackendState.penalty_accum = (zenBackendState.penalty_accum || 0) + rem;
                                    let pens = Math.floor(zenBackendState.penalty_accum / 30);
                                    if (pens > 0) {
                                        pens = Math.min(pens, net);
                                        zenBackendState.penalty_accum %= 30;
                                        zenBackendState.penalty = (zenBackendState.penalty || 0) + pens;
                                        zenBackendState.coin_deductions = (zenBackendState.coin_deductions || 0) + pens;
                                    }
                                } else { zenBackendState.penalty_accum = 0; }
                            }
                        }
                    }
                }
                LS.set('jae_zen_state', zenBackendState);
                return { ...zenBackendState };
            }

            if (path === '/api/system/drain') {
                const currStats = getStats(today);
                const target = 8 * 3600;
                const activeDrain = LS.get('jae_active', null);
                const elapsedNow = (activeDrain && activeDrain.abs_start) ? Math.floor((Date.now() - activeDrain.abs_start) / 1000) : 0;

            const [targetReached, setTargetReached] = React.useState(false);

            const engine = React.useRef({
                virtualSecs: null, 
                targetSecs: null,  
                lastFrame: performance.now(),
            });

            React.useEffect(() => {
                const poller = setInterval(() => {
                    fetch('/api/system/drain').then(r=>r.json()).then(d => {
                        setStatus(d.status);
                        setLevel(d.level);
                        
                        if (d.rem === 'TARGET_REACHED') {
                            setTargetReached(true);
                            engine.current.targetSecs = null;
                            engine.current.virtualSecs = null; // Stop timer
                            setDisplay(null); // Clear old display
                        } else if (d.status === 'DISCHARGING' && typeof d.rem === 'number' && d.rem > 0) {
                            setTargetReached(false);
                            const newTarget = d.rem; 
                            
                            engine.current.targetSecs = newTarget;
                            if (engine.current.virtualSecs === null) {
                                engine.current.virtualSecs = newTarget; // Initial snap
                            }
                        } else {
                            setTargetReached(false);
                            engine.current.targetSecs = null;
                        }
                    }).catch(()=>{ 
                        engine.current.targetSecs = null;
                        setTargetReached(false); 
                    });
                }, 1000); 

                const loop = () => {
                    const now = performance.now();
                    const dt = (now - engine.current.lastFrame) / 1000;
                    engine.current.lastFrame = now;
                    const s = engine.current;

                    if (s.virtualSecs !== null) {
                        s.virtualSecs -= dt;

                        if (s.targetSecs !== null) {
                            const diff = s.targetSecs - s.virtualSecs;
                            s.virtualSecs += diff * 0.1 * dt;
                        }

                        const total = Math.max(0, s.virtualSecs);
                        const h = Math.floor(total/3600);
                        const m = Math.floor((total%3600)/60);
                        const sec = Math.floor(total % 60);
                        const pad = n => n.toString().padStart(2,'0');

                        setDisplay((h>0 ? h+":" : "") + pad(m) + ":" + pad(sec));
                        setAlert(h===0 && m < 30);
                    }
                    requestAnimationFrame(loop);
                };
                
                const raf = requestAnimationFrame(loop);
                return () => { clearInterval(poller); cancelAnimationFrame(raf); };
            }, []);

            return { display, alert, status, level, targetReached };

                        if (!d.active && d.title === 'SYSTEM IDLE') {
                            setArtUrl(null);
                        }
                    }).catch(()=>{});
                }, 3000);
                return () => clearInterval(poll);
            }, [date]);

            React.useEffect(() => {
                let isMounted = true;
                const dKey = getLocalKey(date);
                fetch(`/api/tasks?date=${dKey}`).then(r=>r.json()).then(res => {
                    if (isMounted) setTasks(res || generateDailyTasks(date));
                });
                fetch(`/api/stats?date=${dKey}`).then(r=>r.json()).then(data => {
                    if (isMounted) setStats(data);
                });
                return () => { isMounted = false; };
            }, [date]);

            const changeDate = (n) => { vibrate(20); const d = new Date(date); d.setDate(d.getDate()+n); setDate(d); };
            const saveTasks = (nt) => { 
                setTasks(nt); 
                const targetDate = getLocalKey(dateRef.current);
                fetch('/api/tasks', {
                    method:'POST', 
                    headers:{'Content-Type':'application/json'}, 
                    body:JSON.stringify({date:targetDate, tasks:nt})
                }).then(() => {
                    // Refresh stats to capture new offline coins
                    fetch(`/api/stats?date=${targetDate}`).then(r=>r.json()).then(data => {
                        if (getLocalKey(dateRef.current) === targetDate) setStats(data);
                    });
                }); 
            };
            
            const addTask = () => { vibrate(30); const t = {id:Math.random(), text:'New Directive', tag:'MISC', mode:'focus', done:false}; saveTasks([...tasks, t]); };
            const deleteTask = (id) => { if(confirm('DELETE TASK?')) saveTasks(tasks.filter(t=>t.id!==id)); };
            const toggleTask = (id) => { vibrate(20); saveTasks(tasks.map(t=>t.id===id?{...t, done:!t.done}:t)); };
            const moveTask = (id, dir) => {
                const idx = tasks.findIndex(t => t.id === id);
                if ((dir === -1 && idx === 0) || (dir === 1 && idx === tasks.length - 1)) return;
                const newTasks = [...tasks];
                [newTasks[idx], newTasks[idx + dir]] = [newTasks[idx + dir], newTasks[idx]];
                saveTasks(newTasks);
                vibrate(15);
            };
            
            const startActiveTask = (taskData) => {
                const payload = {...taskData, abs_start: Date.now(), elapsed: taskData.elapsed || 0};
                setActiveTask(payload);
                fetch('/api/task/active', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(payload)});
            };

            const initiate = (t) => {
                vibrate(50);
                if (!zen.mode) {
                    // Auto-prompt to activate Zen Mode
                    if(confirm(`🔥 FIRST TASK DETECTED: ACTIVATE ZEN MODE FOR THE DAY?

- 52/17 Rule Enforced.
- Coins lost for wasting time.
- CANNOT BE TURNED OFF TODAY.`)) {
                        setZen(prev => ({...prev, mode: true}));
                    }
                }
                const match = (t.text || "").match(/[A-Z]:(\d+)\s*$/);
                if ((t.mode === 'training' || t.mode === 'online_test') && match) {
                    // [PATCH] Bypass config and auto-inject problem count
                    startActiveTask({...t, problems: parseInt(match[1], 10)});
                } else if(t.mode === 'training' || t.mode === 'online_test') {
                    setConfigTask(t);
                } else {
                    startActiveTask(t);
                }
            };

            const ctrlMedia = (a) => { vibrate(20); fetch('/api/media/control', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:a})}); };
            const changeTheme = (t) => { document.body.className = 'theme-'+t; localStorage.setItem('jae_theme', t); vibrate(30); };
            const takeBreak = (currentTime, currentQ, currentCorrect, currentScore) => {
                const newPausedState = {
                    ...pausedTasks,
                    [activeTask.id]: { 
                        ...activeTask, 
                        elapsed: currentTime, 
                        lastQ: currentQ, 
                        lastCorrect: currentCorrect,
                        lastScore: currentScore 
                    }
                };
                // Single atomic request: saves paused task AND clears active_task together.
                fetch('/api/task/break', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({paused_tasks: newPausedState})
                });
                setPausedTasks(newPausedState);
                setActiveTask(null);
                vibrate(30);
            };
            const resumeTask = (id) => {
                const task = pausedTasks[id];
                startActiveTask(task);
                const newPaused = {...pausedTasks};
                delete newPaused[id];
                setPausedTasks(newPaused);
                fetch('/api/tasks/paused', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(newPaused)});
                vibrate(30);
            };

            const scheduleItem = SCHEDULE[getLocalKey(date)];
            // TROPHY LOGIC
            const targetHours = scheduleItem ? scheduleItem.target : 5; // Default target for off-days
            const targetMet = targetHours > 0 && (stats.today_time / 3600) >= targetHours;
            const displayCoins = (stats.total_coins || 0) + (targetMet ? 500 : 0);

            return (
                <div onDoubleClick={() => { if(!document.fullscreenElement) document.documentElement.requestFullscreen(); else document.exitFullscreen(); }}>
                    
                    {/* COMMAND HEADER (RESTRUCTURED FOR ALIGNMENT) */}
                    <div className="header" style={{alignItems: 'flex-start'}}>
                        {/* LEFT PANE */}
                        <div style={{flexGrow: 1}}>
                            <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'center', width: '100%', marginBottom: '5px'}}>
                                <h1 style={{margin: 0, lineHeight: 1}}>
                                    JAEXO MALACHITE{targetMet && ' 🏆'}
                                </h1>
                                <img 
                                    src="https://iili.io/qKNVaF1.png" 
                                    style={{height: '1.8rem', width: 'auto', display: 'block'}} 
                                />
                            </div>
                            <div className="stat-ticker">
                                <span>TIME: <span className="stat-val">{(stats.today_time/3600).toFixed(2)}h</span> <span style={{fontSize:'0.7em', color:'#555'}}>/ {targetHours}h</span> {(stats.lanterns || 0) > 0 && <span style={{marginLeft: 5, fontSize: '0.9rem'}}>{'🏮'.repeat(stats.lanterns)}</span>}</span>&nbsp;
                                <span>ACC: <span className="stat-val">{stats.accuracy.toFixed(0)}%</span></span>&nbsp;
                                <span>🥇: <span className="stat-val" style={{color:'#fb0'}}>{displayCoins}</span></span>&nbsp;
                                <span className="stat-val" style={{cursor:'pointer', marginLeft: 10}} onClick={()=>setDeckOpen(!deckOpen)}>[COMMAND DECK]</span>
                            </div>
                        </div>
                        {/* RIGHT PANE (DATE & POWER) */}
                        <div style={{textAlign:'right', marginLeft: '20px', minWidth: 'fit-content'}}>
                             {/* POWER INDICATOR MOVED HERE */}
                            <div style={{marginBottom: '5px'}}>
                                {drain.status === 'CHARGING' || drain.status === 'FULL' ? (
                                    <div style={{fontFamily:'var(--f-hud)', fontWeight:'bold', color:'#0f0', letterSpacing:'1px', fontSize:'0.9rem'}}>
                                        <span className="material-symbols-outlined" style={{fontSize:'1rem', verticalAlign:'middle'}}>bolt</span>
                                        {drain.level}%
                                    </div>
                                ) : drain.targetReached ? (
                                    <div style={{fontFamily:'var(--f-hud)', fontWeight:'bold', color: 'var(--alert)', letterSpacing:'1px', fontSize:'0.9rem', display: 'flex', alignItems: 'center'}}>
                                        <span className="material-symbols-outlined" style={{fontSize:'1.1rem', verticalAlign:'middle', marginRight: '4px'}}>battery_alert</span>
                                        LOW POWER
                                    </div>
                                ) : (
                                    <div style={{fontFamily:'var(--f-hud)', fontWeight:'bold', color: drain.alert ? 'var(--alert)' : 'var(--dim)', letterSpacing:'1px'}}>
                                        REM: {drain.display || 'SYNC...'}
                                    </div>
                                )}
                            </div>
                            <div style={{color:'var(--accent)', fontFamily:'var(--f-hud)', fontSize: '0.9rem'}}>{date.toDateString().toUpperCase()}</div>
                            <div style={{fontSize:'0.7rem', color:'var(--dim)', cursor:'pointer'}} onClick={()=>setDate(new Date())}>[RETURN TO TODAY]</div>
                                                        <div style={{marginTop: '5px', display:'flex', justifyContent:'flex-end', alignItems:'center', gap:'10px'}}>
                                {getLocalKey(date) === getLocalKey(new Date()) && (
                                    <>
                                        {zen.mode && (
                                            <div style={{display:'flex', flexDirection:'column', alignItems:'flex-end'}}>
                                                {zen.penalty > 0 && <span style={{color:'var(--alert)', fontWeight:'bold', fontFamily:'var(--f-hud)', fontSize:'0.8rem'}}>🔻-{zen.penalty} COINS</span>}
                                                {zen.balance > 0 ? (
                                                    <span style={{color: '#fb0', fontFamily:'var(--f-hud)', fontWeight:'bold', fontSize:'0.9rem'}}>
                                                        ☕ {Math.floor(zen.balance/60)}m {Math.floor(zen.balance%60)}s
                                                    </span>
                                                ) : (
                                                    !activeTask ? (
                                                        zen.has_completed_task ? (
                                                            <span className="paused-indicator" style={{color: 'var(--alert)', fontFamily:'var(--f-hud)', fontWeight:'bold', fontSize:'0.8rem'}}>
                                                                ⚠️ -1 COIN IN {Math.max(0, 30 - (zen.penalty_accum||0)).toFixed(0)}s
                                                            </span>
                                                        ) : (
                                                            <span style={{color: 'var(--dim)', fontFamily:'var(--f-hud)', fontWeight:'bold', fontSize:'0.7rem'}}>
                                                                AWAITING FIRST TASK
                                                            </span>
                                                        )
                                                    ) : null
                                                )}
                                            </div>
                                        )}
                                        {zen.mode && (zen.momentum||0) > 0 && (
                                            <span style={{fontSize:'1.1rem', marginRight:'8px', textShadow:'0 0 10px #0af', animation:'pulse 2s infinite'}}>
                                                {'💠'.repeat(zen.momentum)}
                                            </span>
                                        )}
                                        <div 
                                            onClick={() => {
                                                if(!zen.mode) {
                                                    if(confirm(`🔥 ACTIVATE ZEN MODE FOR TODAY?

- 52/17 Rule Enforced.
- Coins lost for wasting time.
- CANNOT BE TURNED OFF TODAY.`)) {
                                                        setZen(prev => ({...prev, mode: true}));
                                                    }
                                                }
                                            }}
                                            style={{
                                                cursor: zen.mode ? 'default' : 'pointer',
                                                filter: zen.mode ? 'none' : 'grayscale(100%) opacity(0.6)',
                                                fontSize: '1.5rem',
                                                transition: '0.3s',
                                                textShadow: zen.mode ? `0 0 15px #f00, 0 0 ${10 + (zen.momentum||0)*8}px #0af` : 'none',
                                                transform: zen.mode ? 'scale(1.1)' : 'scale(1)'
                                            }}
                                            title={zen.mode ? "ZEN ACTIVE (LOCKED)" : "ACTIVATE ZEN MODE"}
                                        >
                                            {zen.mode ? '🔥' : '📛'}
                                        </div>
                                    </>
                                )}
                            </div>

                            

                        </div>
                    </div>

                    {/* COLLAPSIBLE COMMAND DECK */}
                    <div className={`command-deck ${deckOpen ? 'open' : ''}`}>
                        <div className="deck-row">
                            <button className="deck-btn" onClick={()=>changeDate(-1)}>PREV</button>
                            <button className="deck-btn" onClick={()=>changeDate(1)}>NEXT</button>
                            <div className="theme-bar">
                                {['matrix','redline','deepspace','amber','ghost'].map(t=>(
                                    <div key={t} className="theme-dot" style={{background: t==='matrix'?'#0f4':t==='redline'?'#f00':t==='deepspace'?'#0df':t==='amber'?'#fb0':'#eee'}} onClick={()=>changeTheme(t)}></div>
                                ))}
                            </div>
                            <div style={{flexGrow:1}}></div>
                            <button className="deck-btn danger" onClick={()=>{if(confirm('WIPE TODAY LOGS?')) fetch('/api/reset_day',{method:'POST'}).then(()=>window.location.reload())}}>RESET</button>
                        </div>
                        
                        <div className="deck-row" style={{flexDirection: 'column', gap: '15px'}}>
                            <div className="sonic-deck" style={{width: '100%', marginLeft: 0, paddingLeft: 0, borderLeft: 'none'}}>
                                {artUrl ? <img src={artUrl} className="album-art" /> : <span className="material-symbols-outlined" style={{color:'var(--dim)'}}>music_note</span>}
                                <div className="track-info">
                                    <div style={{fontSize:'0.8rem'}}>{media.title}</div>
                                    <div style={{fontSize:'0.65rem', color:'var(--dim)'}}>{media.artist}</div>
                                </div>
                                <button className="deck-btn" onClick={()=>ctrlMedia('prev')}>PREV</button>
                                <button className="deck-btn" onClick={()=>ctrlMedia('playpause')}>P/P</button>
                                <button className="deck-btn" onClick={()=>ctrlMedia('next')}>NEXT</button>
                            </div>
                        </div>

                        <div className="deck-row">
                            <button className="deck-btn" style={{flex:1}} onClick={addTask}>+ ADD TASK</button>
                            <button className="deck-btn" style={{flex:1}} onClick={()=>setSummaryOpen(true)}>MISSION REPORT</button>
                        </div>
                    </div>

                    {scheduleItem && <div className="event-banner">{(scheduleItem.type === 'PREP' || scheduleItem.type === 'GRIND') ? 'JUGGERNAUT PROTOCOL : ALL SUBJECTS ACTIVE' : scheduleItem.event}</div>}

                    {Object.values(pausedTasks).map(pt => (
                        <div key={pt.id} className="event-banner" style={{background: 'linear-gradient(90deg, #111, transparent)', display:'flex', justifyContent:'space-between', alignItems:'center', borderLeftColor:'var(--accent)', color:'#fb0'}}>
                            <span>PAUSED: {pt.text} ({new Date(pt.elapsed*1000).toISOString().substr(11,8)})</span>
                            <button className="engage-btn" onClick={() => resumeTask(pt.id)}>RESUME</button>
                        </div>
                    ))}

                    {/* TASK LIST */}
                    <div className="list-container">
                        {tasks.map(t => (
                            <div key={t.id} className={`task-item ${t.done ? 'done' : ''}`}>
                                {/* Reorder & Checkbox Group */}
                                <div style={{display:'flex', alignItems:'center', gap: '5px'}}>
                                    <div style={{display:'flex', flexDirection:'column'}}>
                                        <button style={{background:0, border:0, color:'var(--dim)', padding:0, height:15, cursor:'pointer'}} onClick={()=>moveTask(t.id, -1)}>
                                            <span className="material-symbols-outlined" style={{fontSize:18}}>keyboard_arrow_up</span>
                                        </button>
                                        <button style={{background:0, border:0, color:'var(--dim)', padding:0, height:15, cursor:'pointer'}} onClick={()=>moveTask(t.id, 1)}>
                                            <span className="material-symbols-outlined" style={{fontSize:18}}>keyboard_arrow_down</span>
                                        </button>
                                    </div>
                                    <button style={{background:0, border:0, color:'var(--text)', cursor:'pointer'}} onClick={()=>toggleTask(t.id)}>
                                        <span className="material-symbols-outlined">{t.done ? 'check_box' : 'check_box_outline_blank'}</span>
                                    </button>
                                </div>

                                {/* Text & Tag Section - Shrinkable */}
                                <div style={{flex: '1 1 200px', minWidth: 0, display:'flex', flexDirection:'column'}}>
                                    <input className="task-input" style={{width: '100%'}} value={t.text} onChange={e => saveTasks(tasks.map(x=>x.id===t.id?{...x, text:e.target.value}:x))} />
                                    <div style={{paddingLeft:10, display:'flex', gap:10, alignItems:'center'}}>
                                        <span className="tag">{t.tag}</span>
                                        <select style={{background:'#000', color:'var(--dim)', border:'1px solid #222', fontSize:'0.7rem'}} value={t.mode} onChange={e=>saveTasks(tasks.map(x=>x.id===t.id?{...x, mode:e.target.value}:x))}>
                                            <option value="offline">OFFLINE</option>
                                            <option value="focus">FOCUS</option>
                                            <option value="training">TRAINING</option>
                                            <option value="online_test">ONLINE TEST</option>
                                        </select>
                                    </div>
                                </div>

                                {/* Action Buttons Group */}
                                <div style={{display:'flex', alignItems:'center', gap: '8px', marginLeft: 'auto'}}>
                                    {!t.done && t.mode !== 'offline' && <button className="engage-btn" onClick={()=>initiate(t)}>ENGAGE</button>}
                                    <button className="icon-btn" style={{background:0, border:0, color:'#333', cursor:'pointer'}} onClick={()=>deleteTask(t.id)}>
                                        <span className="material-symbols-outlined">delete</span>
                                    </button>
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* OVERLAYS */}
                    {configTask && (
                        <div className="overlay">
                            <div className="modal">
                                <h3>MISSION CONFIG</h3>
                                <p style={{fontSize:'0.8rem'}}>{configTask.text}</p>
                                <input className="inp-full" type="number" value={probCount} onChange={e=>setProbCount(e.target.value)} />
                                <div style={{display:'flex', gap:10}}>
                                    <button className="hud-btn" style={{flex:1}} onClick={()=>{const t = {...configTask, problems:parseInt(probCount)}; setConfigTask(null); startActiveTask(t);}}>START</button>
                                    <button className="hud-btn" style={{flex:1, borderColor: 'var(--alert)', color:'var(--alert)'}} onClick={()=>setConfigTask(null)}>CANCEL</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {activeTask && (
                        <HUD 
                            zen={zen}
                            task={activeTask} 
                            media={media}
                            artUrl={artUrl}
                            ctrlMedia={ctrlMedia}
                            onAbort={()=>{setActiveTask(null); fetch('/api/task/active', {method:'DELETE'});}} 
                            onBreak={takeBreak}
                            onComplete={(s)=>{ 
                                setStats(s); 
                                saveTasks(tasks.map(x=>x.id===activeTask.id?{...x,done:true}:x)); 
                                setActiveTask(null); 
                            }} 
                        />
                    )}

                    {summaryOpen && <MissionReport stats={stats} date={date} scheduleItem={scheduleItem} onClose={()=>setSummaryOpen(false)} />}

                </div>
            );
        };

        const HUD = ({ zen, task, onAbort, onComplete, onBreak, media, artUrl, ctrlMedia }) => {
            const [time, setTime] = React.useState(task.elapsed || 0);
            const [qTime, setQTime] = React.useState(0);
            const [qIdx, setQIdx] = React.useState(task.lastQ || 1);
            const [correct, setCorrect] = React.useState(task.lastCorrect || 0);
            const [score, setScore] = React.useState(task.lastScore || 0);

            const [view, setView] = React.useState('timer');
            const [marks, setMarks] = React.useState("");
            const [tMarks, setTMarks] = React.useState("");
            
            const [showMusic, setShowMusic] = React.useState(false);

            React.useEffect(() => {
                let wl = null;
                if(navigator.wakeLock) navigator.wakeLock.request('screen').then(l=>wl=l);
                
                const startTs = task.abs_start || Date.now();
                const baseElapsed = task.elapsed || 0;
                
                const tick = () => {
                    const now = Date.now();
                    const totalSeconds = baseElapsed + Math.floor((now - startTs) / 1000);
                    setTime(totalSeconds);
                    setQTime(t=>t+1);
                };
                
                const iv = setInterval(tick, 1000);
                tick();
                
                return () => { clearInterval(iv); if(wl) wl.release(); };
            }, [task.abs_start, task.elapsed]);

            // LOGIC: CORRECT (+4 and Next)
            const handleCorrect = () => {
                if(navigator.vibrate) navigator.vibrate(20);
                setCorrect(c => c + 1);
                setScore(s => s + 4);
                advanceQuestion();
            };

            // LOGIC: RETRY (-1 and Stay)
            const handleRetry = () => {
                if(navigator.vibrate) navigator.vibrate([50, 50]); // Double buzz for penalty
                setScore(s => s - 1);
                // Do not advance qIdx
            };

            // LOGIC: SKIP (0 and Next)
            const handleSkip = () => {
                if(navigator.vibrate) navigator.vibrate(20);
                advanceQuestion();
            };

            const advanceQuestion = () => {
                setQTime(0);
                if(task.mode==='training' && qIdx < (task.problems || 15)) { 
                    setQIdx(i=>i+1); 
                } else { 
                    finish(); 
                }
            };

            const finish = (finalC) => {
                // Pass current correct count if not provided
                const c = finalC !== undefined ? finalC : correct;
                if(task.mode === 'online_test') { setView('report'); return; }
                
                // Submit with calculated score
                submit({
                    type: task.mode, 
                    duration: time, 
                    questions: task.mode==='training'?(task.problems||15):0, 
                    correct: c,
                    marks_scored: score // Save the calculated score
                });
            };

            const submit = (payload) => {
                fetch('/api/log_session', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({...payload, task_name:task.text, tag:task.tag})})
                .then(r=>r.json()).then(d=>onComplete(d.stats));
            };

            if(view==='report') return (
                <div className="overlay">
                    <div className="modal">
                        <h3>TEST COMPLETED</h3>
                        <input className="inp-full" placeholder="MARKS SCORED" type="number" value={marks} onChange={e=>setMarks(e.target.value)} />
                        <input className="inp-full" placeholder="TOTAL MARKS" type="number" value={tMarks} onChange={e=>setTMarks(e.target.value)} />
                        <button className="hud-btn" style={{width:'100%'}} onClick={()=>submit({type:task.mode, duration:time, marks_scored:marks, marks_total:tMarks, questions:task.problems||0, correct:0})}>LOG RESULTS</button>
                    </div>
                </div>
            );

            return (
                <div className="overlay">
                    <div className="hud-content-wrapper">
                        
                        <div className="hud-left-pane" style={{width:'100%', display:'flex', flexDirection:'column', alignItems:'center'}}>
                            <div style={{color:'var(--dim)', letterSpacing:4, marginBottom: 10}}>{task.mode.toUpperCase()} ACTIVE</div>
                            {time >= 3600 && (
                                <div style={{marginBottom: -10, fontSize: '1.5rem'}}>
                                    {Array.from({length: Math.floor(time / 3600)}).map((_, i) => (
                                        <span key={i} className="lantern">🏮</span>
                                    ))}
                                </div>
                            )}
                            <div className={`timer-big ${time >= 3120 ? 'overdrive-text' : ''}`}>
                                {new Date(time*1000).toISOString().substr(11,8)}
                            </div>
                            {time >= 3120 && <div style={{color:'#fb0', fontSize:'0.75rem', fontWeight:'bold', letterSpacing:'2px', marginBottom:'10px', animation:'pulse 1.5s infinite'}}>🔥 OVERDRIVE ACTIVE (1.5x)</div>}
                            
                            {/* SCORE DISPLAY ADDED HERE */}
                            {task.mode === 'training' && (
                                <div className="timer-q">
                                    Q_{qIdx} | {new Date(qTime*1000).toISOString().substr(14,5)} | <span style={{color: score >= 0 ? 'var(--text)' : 'var(--alert)'}}>SCR: {score > 0 ? '+'+score : score}</span>
                                </div>
                            )}
                            
                            <h2 style={{textAlign:'center', padding:'0 20px', fontSize: '1rem', color: '#fff'}}>{task.text}</h2>
                            
                            <div className="hud-grid">
                                {task.mode === 'training' ? (
                                    <>
                                        <button className="hud-btn" onClick={handleCorrect}>CORRECT (+4)</button>
                                        <button className="hud-btn" style={{borderColor:'var(--alert)', color:'var(--alert)'}} onClick={handleRetry}>RETRY (-1)</button>
                                        <button className="hud-btn" style={{borderColor:'#444', color:'#444'}} onClick={handleSkip}>SKIP (0)</button>
                                    </>
                                ) : (
                                    <button className="hud-btn" style={{gridColumn:'1/span 3'}} onClick={()=>finish()}>TERMINATE SESSION</button>
                                )}
                                
                                {/* Updated Take Break to save score */}
                                <button className={`hud-btn ${(zen && zen.mode && zen.balance > 0) ? 'break-btn-active' : ''}`} style={{gridColumn:'1/span 3', borderColor: '#fb0', color: '#fb0', marginTop: '5px', display: (zen && zen.mode && zen.balance <= 0) ? 'none' : 'block'}} 
                                        onClick={() => onBreak(time, qIdx, correct, score)}>
                                    TAKE BREAK (SAVE)
                                </button>
                            </div>
                            <button style={{marginTop:20, background:0, border:0, color:'#555', cursor:'pointer'}} onClick={onAbort}>ABORT OPERATION</button>
                        </div>

                        {/* RIGHT PANE (Unchanged logic) */}
                        <div className="hud-right-pane" style={{
                            marginTop: 30, width: '90%', maxWidth: '400px', borderTop: '1px solid #333', paddingTop: 15,
                            display: (window.innerWidth >= 800 || showMusic) ? 'flex' : 'none' 
                        }}>
                            <div className="music-toggle-btn" style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:10, width:'100%'}}>
                                <span style={{fontSize:'0.7rem', color:'var(--dim)'}}>JPX MEDIA LINK</span>
                                <span className="material-symbols-outlined" style={{fontSize:'1.2rem', cursor:'pointer'}} onClick={()=>setShowMusic(!showMusic)}>{showMusic ? 'expand_less' : 'expand_more'}</span>
                            </div>
                            
                            <div style={{display: (showMusic || window.innerWidth >= 800) ? 'block' : 'none', width: '100%'}}>
                                <div className="sonic-deck" style={{border:'1px solid #333', borderRadius: 4, padding: 10, background: '#000'}}>
                                    {artUrl ? <img src={artUrl} className="album-art" style={{width:50, height:50}} /> : <span className="material-symbols-outlined" style={{color:'var(--dim)'}}>music_note</span>}
                                    <div className="track-info">
                                        <div style={{fontSize:'0.8rem'}}>{media.title}</div>
                                        <div style={{fontSize:'0.65rem', color:'var(--dim)'}}>{media.artist}</div>
                                    </div>
                                </div>
                                <div style={{display:'flex', gap:10, marginTop:10}}>
                                    <button className="deck-btn" style={{flex:1}} onClick={()=>ctrlMedia('prev')}>PREV</button>
                                    <button className="deck-btn" style={{flex:1}} onClick={()=>ctrlMedia('playpause')}>P/P</button>
                                    <button className="deck-btn" style={{flex:1}} onClick={()=>ctrlMedia('next')}>NEXT</button>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
            );
        };

        const MissionReport = ({ stats, date, scheduleItem, onClose }) => {
            React.useEffect(() => { 
                if(navigator.vibrate) navigator.vibrate([100,50,100]); 
            }, []);

            // Formats ATPQ beautifully
            const fmtTime = (s) => {
                if(!s) return "0s";
                if(s < 60) return Math.floor(s) + "s";
                return Math.floor(s/60) + "m " + Math.floor(s%60) + "s";
            };

            const hrs = (stats.today_time||0)/3600;
            const outRatio = (stats.output_time||0) / (stats.today_time||1);
            const grindRatio = stats.grind_ratio || 0;
            const acc = stats.accuracy || 0;
            
            // Proprietary Grading System
            let score = (hrs * 10) + (acc * 0.4) + (outRatio * 20); 
            let grade = 'C';
            if(score >= 95) grade = 'S+';
            else if(score >= 80) grade = 'S';
            else if(score >= 65) grade = 'A';
            else if(score >= 50) grade = 'B';

            const targetMet = scheduleItem && scheduleItem.target > 0 && hrs >= scheduleItem.target;
            const finalCoins = (stats.total_coins || 0) + (targetMet ? 500 : 0);

            return (
                <div className="overlay" style={{background: 'rgba(5,5,5,0.98)', overflowY: 'auto', padding: '10px', display:'block', zIndex: 1000}}>
                    <div style={{maxWidth: '600px', margin: '40px auto', paddingBottom: '50px'}}>
                        
                        {/* HEADER */}
                        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', borderBottom:'1px solid #333', paddingBottom:'15px', marginBottom:'20px'}}>
                            <div>
                                <h1 style={{margin:0, color:'var(--accent)', fontSize:'2rem', fontFamily:'var(--f-hud)'}}>MISSION REPORT</h1>
                                <div style={{color:'var(--dim)', fontSize:'0.8rem', letterSpacing:'1px'}}>{getLocalKey(date)} // GRADE: <span style={{color: grade.includes('S')?'#0f0':grade==='A'?'#fb0':'#fff', fontWeight:'bold', fontSize:'1rem'}}>{grade}</span></div>
                            </div>
                            <div style={{textAlign:'right'}}>
                                <div style={{fontSize:'2.2rem', fontFamily:'var(--f-hud)', color:'#fb0', fontWeight:'bold'}}>{finalCoins}</div>
                                <div style={{fontSize:'0.65rem', color:'#fb0', letterSpacing:'1px'}}>NET CREDITS</div>
                            </div>
                        </div>

                        {/* KEY METRICS */}
                        <div className="hud-grid" style={{width:'100%', maxWidth:'100%', marginBottom:'20px'}}>
                            <div style={{background:'#111', padding:'15px', border:'1px solid #333', textAlign:'center', borderRadius:'4px'}}>
                                <div style={{fontSize:'1.5rem', fontWeight:'bold', color:'var(--text)'}}>{hrs.toFixed(1)}h</div>
                                <div style={{fontSize:'0.7rem', color:'var(--dim)'}}>TOTAL TIME</div>
                            </div>
                            <div style={{background:'#111', padding:'15px', border:'1px solid #333', textAlign:'center', borderRadius:'4px'}}>
                                <div style={{fontSize:'1.5rem', fontWeight:'bold', color: acc>80?'#0f0':acc>50?'#fb0':'#f55'}}>{acc.toFixed(0)}%</div>
                                <div style={{fontSize:'0.7rem', color:'var(--dim)'}}>GLOBAL ACC</div>
                            </div>
                            <div style={{background:'#111', padding:'15px', border:'1px solid #333', textAlign:'center', borderRadius:'4px'}}>
                                <div style={{fontSize:'1.5rem', fontWeight:'bold', color:'#fff'}}>{stats.questions_today || 0}</div>
                                <div style={{fontSize:'0.7rem', color:'var(--dim)'}}>PROBLEMS</div>
                            </div>
                            <div style={{background:'#111', padding:'15px', border:'1px solid #333', textAlign:'center', borderRadius:'4px'}}>
                                <div style={{fontSize:'1.5rem', fontWeight:'bold', color:'#0df'}}>{stats.tasks_completed||0}/{stats.tasks_total||0}</div>
                                <div style={{fontSize:'0.7rem', color:'var(--dim)'}}>DIRECTIVES</div>
                            </div>
                            <div style={{background:'#111', padding:'15px', border:'1px solid #333', textAlign:'center', borderRadius:'4px', gridColumn: 'span 2'}}>
                                <div style={{fontSize:'1.5rem', fontWeight:'bold', color:'#f0f'}}>{(grindRatio*100).toFixed(0)}%</div>
                                <div style={{fontSize:'0.7rem', color:'var(--dim)'}}>GRIND RATIO (REAL-TIME ABS)</div>
                            </div>
                        </div>

                        {/* DEEP DIVE TABLE */}
                        <div style={{background:'#111', border:'1px solid #333', padding:'15px', marginBottom:'20px', borderRadius:'4px'}}>
                            <h3 style={{marginTop:0, borderBottom:'1px solid #333', paddingBottom:'10px', fontSize:'0.9rem', color:'var(--dim)', letterSpacing:'1px'}}>SUBJECT ANALYTICS & ATPQ</h3>
                            
                            <div style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap:'5px', fontSize:'0.7rem', color:'var(--dim)', marginBottom:'15px', textTransform:'uppercase', fontWeight:'bold'}}>
                                <div>TAG</div>
                                <div>TIME</div>
                                <div>ATPQ (SPD)</div>
                                <div>SCORE / ACC</div>
                            </div>

                            {Object.keys(stats.subject_breakdown || {}).length > 0 ? Object.entries(stats.subject_breakdown).map(([tag, data]) => {
                                const isZero = data.time === 0;
                                if(isZero) return null;
                                const atpq = data.q > 0 ? (data.time / data.q) : 0;
                                const t_acc = data.q > 0 ? (data.c / data.q * 100) : 0;

                                return (
                                    <div key={tag} style={{display:'grid', gridTemplateColumns:'1fr 1fr 1fr 1fr', gap:'5px', alignItems:'center', marginBottom:'12px', borderBottom:'1px dashed #222', paddingBottom:'8px'}}>
                                        <div style={{fontWeight:'bold', color:'var(--text)', fontSize:'0.9rem'}}>{tag}</div>
                                        <div style={{color:'#ddd', fontSize:'0.85rem'}}>{fmtTime(data.time)}</div>
                                        <div>
                                            {data.q > 0 ? (
                                                <span style={{color: atpq < 120 ? '#0f0' : atpq < 240 ? '#fb0' : '#f55', fontWeight:'bold', fontSize:'0.85rem'}}>
                                                    {fmtTime(atpq)}/Q
                                                </span>
                                            ) : <span style={{opacity:0.3}}>-</span>}
                                        </div>
                                        <div style={{display:'flex', flexDirection:'column', gap:'3px'}}>
                                            {(data.marks > 0 || data.marks_total > 0) && (
                                                <span style={{color: '#0df', fontWeight:'bold', fontSize:'0.9rem'}}>{data.marks}/{data.marks_total} <span style={{fontSize:'0.65em', color:'#666'}}>SCR</span></span>
                                            )}
                                            {data.train_q > 0 ? (() => {
                                                const tr_acc = data.train_c / data.train_q * 100;
                                                return (
                                                    <span>
                                                        <span style={{color: tr_acc > 80 ? '#0f0' : tr_acc > 50 ? '#fb0' : '#f55', fontWeight:'bold', fontSize:'0.9rem'}}>{tr_acc.toFixed(0)}%</span>
                                                        <span style={{fontSize:'0.65em', color:'#666', marginLeft:'4px'}}>({data.train_c}/{data.train_q})</span>
                                                    </span>
                                                );
                                            })() : (data.marks === 0 && data.marks_total === 0) && <span style={{opacity:0.3}}>-</span>}
                                        </div>
                                    </div>
                                );
                            }) : <div style={{textAlign:'center', color:'#555', padding:'10px'}}>NO SUBJECT DATA</div>}
                        </div>

                        {scheduleItem && (
                            <div className="event-banner" style={{textAlign:'center', padding:'15px', borderRadius:'4px', background: targetMet?'rgba(0,255,0,0.1)':'rgba(255,0,0,0.1)', borderColor: targetMet?'#0f0':'#f00'}}>
                                <div style={{color:'#fff', marginBottom:'5px'}}>{scheduleItem.event}</div>
                                {targetMet ? 
                                    <span style={{color:'#0f0', fontWeight:'bold'}}>MISSION ACCOMPLISHED 🏆 (+500 CREDITS)</span> : 
                                    <span style={{color:'var(--alert)', fontWeight:'bold'}}>TARGET MISSED by {Math.abs(hrs - scheduleItem.target).toFixed(1)}h (Goal: {scheduleItem.target}h)</span>
                                }
                            </div>
                        )}

                        <button className="hud-btn" style={{width:'100%', marginTop:'10px'}} onClick={onClose}>CLOSE REPORT</button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
